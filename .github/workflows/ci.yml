name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpq-dev \
            ffmpeg \
            tesseract-ocr \
            libtesseract-dev

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Run Black
        run: poetry run black --check app tests
        continue-on-error: true

      - name: Run Ruff
        run: poetry run ruff check app tests
        continue-on-error: true

      - name: Run MyPy
        run: poetry run mypy app/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: social_media_radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpq-dev \
            ffmpeg \
            tesseract-ocr \
            libtesseract-dev \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            libglib2.0-0

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root
          poetry install --no-interaction

      - name: Install Playwright browsers
        run: |
          poetry run playwright install --with-deps chromium
        continue-on-error: true

      - name: Verify installation
        run: |
          poetry run python -c "import sys; print(f'Python: {sys.version}')"
          poetry run python -c "import sqlalchemy; print(f'SQLAlchemy: {sqlalchemy.__version__}')"
          poetry run python -c "import fastapi; print(f'FastAPI: {fastapi.__version__}')"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/social_media_radar_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: test-encryption-key-32-chars!!
          OPENAI_API_KEY: sk-test-key-for-ci
          SECRET_KEY: test-secret-key-for-ci-testing-only
        run: |
          poetry run pytest tests/unit -v --cov=app --cov-report=xml --cov-report=term
        continue-on-error: true

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/social_media_radar_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: test-encryption-key-32-chars!!
          OPENAI_API_KEY: sk-test-key-for-ci
          SECRET_KEY: test-secret-key-for-ci-testing-only
        run: |
          poetry run pytest tests/integration -v --cov=app --cov-append --cov-report=xml --cov-report=term
        continue-on-error: true

      - name: Run other tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/social_media_radar_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: test-encryption-key-32-chars!!
          OPENAI_API_KEY: sk-test-key-for-ci
          SECRET_KEY: test-secret-key-for-ci-testing-only
        run: |
          poetry run pytest tests/test_*.py -v --cov=app --cov-append --cov-report=xml --cov-report=term
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Run Bandit security scan
        run: |
          poetry run pip install bandit
          poetry run bandit -r app/ -ll -f json -o bandit-report.json || true
          poetry run bandit -r app/ -ll
        continue-on-error: true

      - name: Run Safety check
        run: |
          poetry run pip install safety
          poetry run safety check --json || true
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: social-media-radar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

