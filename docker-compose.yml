version: '3.8'

# ---------------------------------------------------------------------------
# Local development stack — single-command startup:
#
#   cp .env.example .env          # fill in SECRET_KEY, ENCRYPTION_KEY, API keys
#   docker compose up
#
# Service URLs (internal Docker network):
#   Postgres  → postgres:5432
#   Redis     → redis:6379
#   MinIO     → minio:9000  (console: minio:9001)
#   API       → localhost:8000
# ---------------------------------------------------------------------------

services:
  # ── PostgreSQL with pgvector ─────────────────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: radar-postgres
    environment:
      POSTGRES_DB: social_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d social_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: radar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: radar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Database initialiser ─────────────────────────────────────────────────
  # Runs once: creates pgvector extension + applies all Alembic migrations.
  # The api and worker services depend on this completing successfully.
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-db-init
    command: >
      sh -c "python scripts/init_db.py && alembic upgrade head"
    env_file:
      - .env
    environment:
      # Override DB URL to point at the Docker-internal postgres host
      DATABASE_URL: postgresql+asyncpg://radar:radar_password@postgres:5432/social_radar
      DATABASE_SYNC_URL: postgresql://radar:radar_password@postgres:5432/social_radar
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  # ── FastAPI application ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      # Docker-internal service URLs override any localhost URLs in .env
      DATABASE_URL: postgresql+asyncpg://radar:radar_password@postgres:5432/social_radar
      DATABASE_SYNC_URL: postgresql://radar:radar_password@postgres:5432/social_radar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Development defaults — capability stubs allowed without real backends.
      # Override these in .env for production (or use docker-compose.prod.yml).
      PRODUCTION_STRICT_MODE: "false"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Celery worker (background ingestion tasks) ───────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-celery-worker
    command: celery -A app.ingestion.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://radar:radar_password@postgres:5432/social_radar
      DATABASE_SYNC_URL: postgresql://radar:radar_password@postgres:5432/social_radar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      PRODUCTION_STRICT_MODE: "false"
      ENVIRONMENT: development
    volumes:
      - .:/app
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ── Celery beat (scheduled ingestion trigger) ────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-celery-beat
    command: celery -A app.ingestion.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://radar:radar_password@postgres:5432/social_radar
      DATABASE_SYNC_URL: postgresql://radar:radar_password@postgres:5432/social_radar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PRODUCTION_STRICT_MODE: "false"
      ENVIRONMENT: development
    volumes:
      - .:/app
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:

